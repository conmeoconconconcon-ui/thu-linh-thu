name: thu_linh_thu
description: Thu Linh Thu - EPUB Reader
publish_to: "none"

version: 1.0.0+3

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  file_picker: ^8.0.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  path: ^1.9.0

  # Giải nén EPUB (zip)
  archive: ^3.6.1

  # Parse XML (container.xml, OPF)
  xml: ^6.5.0

  # Render HTML + ảnh trong EPUB
  flutter_inappwebview: ^6.0.0

flutter:
  uses-material-design: true
